name: Build project

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup SDL3
        uses: libsdl-org/setup-sdl@v1
        with:
          version: 3-latest

      - name: Build project
        run: |
          make
